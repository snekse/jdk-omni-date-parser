name: Gradle Build
description: Checkout, set up JDK 21, configure Gradle, and run ./gradlew build

runs:
  using: composite
  steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 21
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v5
    - name: Build with Gradle
      run: ./gradlew build
      shell: bash