name: Gradle Dependency Graph
description: Set up JDK 21, and submit the Gradle dependency graph for Dependabot alerts

runs:
  using: composite
  steps:
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 21
    - name: Setup Gradle and submit dependency graph
      uses: gradle/actions/setup-gradle@v5
      with:
        dependency-graph: generate-and-submit
